{{- if and .Values.role.create (or .Values.role.namespaceSecrets .Values.role.serviceAccounts) }}
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "ezoidc.roleName" . }}
rules:
{{- if .Values.role.namespaceSecrets }}
- apiGroups: [""]
  resources: ["secrets"]
  verbs: ["get"]
  resourceNames: {{ .Values.role.namespaceSecrets | toJson }}
{{- end }}
{{- if .Values.role.serviceAccounts }}
- apiGroups: [""]
  resources: ["serviceaccounts/token"]
  verbs: ["create"]
  resourceNames: {{ .Values.role.serviceAccounts | toJson }}
{{- end }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "ezoidc.roleName" . }}
subjects:
- kind: ServiceAccount
  name: {{ include "ezoidc.serviceAccountName" . }}
roleRef:
  kind: Role
  name: {{ include "ezoidc.roleName" . }}
  apiGroup: rbac.authorization.k8s.io
{{- end }}
